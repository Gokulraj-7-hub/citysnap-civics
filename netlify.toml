[build]
  # Build command
  command = "cd frontend && npm run build"
  
  # Publish directory (relative to repo root)
  publish = "frontend/dist"

[functions]
  # Serverless functions directory (relative to repo root)
  directory = "netlify/functions"

# Proxy configuration for Hugging Face APIs to bypass CORS in Production
[[redirects]]
  from = "/hf-api/*"
  to = "https://router.huggingface.co/hf-inference/:splat"
  status = 200
  force = true

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Environment variables (if needed later)
# [build.environment]
#   NODE_VERSION = "18"
